<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750">
<link rel="icon" href="image/favicon.ico">
<title>pao_vestige</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #d1d5db;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    gap: 6px;
  }
  canvas {
    display: block;
    cursor: none;
    touch-action: none;
  }
  #toolbar {
    display: flex;
    gap: 8px;
  }
  #hint {
    bottom: 20px;
    left: 0; right: 0;
    text-align: center;
    color: #9ca3af;
    font-size: 20px;
    font-family: sans-serif;
    font-weight: normal;
    letter-spacing: 0.4rem;
    line-height: 1;
    pointer-events: auto;
    cursor: pointer;
    transition: opacity 1.5s;
    user-select: none;
    margin-top: 20px;
  }
  #hint.hidden { opacity: 0; }
  #toast {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(75,85,99,0.75);
    color: #f3f4f6;
    font: 11px/1 Georgia, serif;
    letter-spacing: 0.1em;
    padding: 5px 14px;
    border-radius: 999px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }
  .icon-btn {
    width: 42px;
    height: 42px;
    padding: 8px;
    border: 1.5px solid #9ca3af;
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .icon-btn img {
    width: 24px;
    height: 24px;
    opacity: 0.5;
    transition: opacity 0.15s;
  }
  .icon-btn:hover:not(:disabled) img,
  .icon-btn.active img {
    opacity: 0.85;
  }
  .icon-btn.active {
    background: #e5e7eb;
    border-color: #4b5563;
  }
  .icon-btn:disabled {
    opacity: 0.35;
    cursor: default;
  }
  /* topbar buttons: smaller, no border, hover bg only */
  #btn-clear,
  #btn-manual,
  #btn-output {
    width: 32px;
    height: 32px;
    border-color: transparent;
  }
  #btn-clear:hover:not(:disabled),
  #btn-manual:hover,
  #btn-output:hover:not(:disabled) {
    background: #b1b3ba;
    border-color: transparent;
  }
  #btn-manual {
    text-decoration: none;
  }

  #topbar {
    width: 720px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #topbar-left {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #rec-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #f87171;
    opacity: 0;
    transition: opacity 0.4s;
    flex-shrink: 0;
  }
  #rec-dot.active {
    opacity: 1;
    background: #f87171;
    animation: blink-rec 2s ease-in-out infinite;
  }
  #rec-dot.generating {
    opacity: 1;
    background: #60a5fa;
    animation: blink-gen 0.5s ease-in-out infinite;
  }
  #rec-dot.done {
    opacity: 1;
    background: #4ade80;
    animation: none;
  }
  @keyframes blink-rec {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }
  @keyframes blink-gen {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.15; }
  }
  /* custom cursor canvas */
  #cursor-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<div id="topbar"><div id="topbar-left"><button id="btn-clear" class="icon-btn"><img src="image/new.svg" alt="clear"></button><a href="manual.html" id="btn-manual" class="icon-btn"><img src="image/manual.svg" alt="manual"></a></div><div id="topbar-right"><div id="rec-dot"></div><button id="btn-output" class="icon-btn" disabled><img src="image/download.svg" alt="output"></button></div></div>
<canvas id="c" width="720" height="720"></canvas>
<div id="toolbar">
  <button class="icon-btn active" id="btn-pen"><img src="image/pen.svg" alt="pen"></button>
  <button class="icon-btn"        id="btn-eraser"><img src="image/eraser.svg" alt="eraser"></button>
</div>
<div id="hint">#pao_vestige</div>
<div id="toast">hashtag copied</div>
<canvas id="cursor-canvas"></canvas>

<script>
// ---- main canvas ----
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ---- cursor canvas ----
const cursorCanvas = document.getElementById('cursor-canvas');
const cctx = cursorCanvas.getContext('2d');
function resizeCursor() {
  cursorCanvas.width  = window.innerWidth;
  cursorCanvas.height = window.innerHeight;
}
resizeCursor();
window.addEventListener('resize', resizeCursor);

// ---- tool state ----
let tool = 'pen'; // 'pen' | 'eraser'
const PEN_R    = 1;   // radius (px on canvas)
const ERASER_R = 16;   // radius

document.getElementById('btn-pen').addEventListener('click', () => {
  tool = 'pen';
  document.getElementById('btn-pen').classList.add('active');
  document.getElementById('btn-eraser').classList.remove('active');
});
document.getElementById('btn-eraser').addEventListener('click', () => {
  tool = 'eraser';
  document.getElementById('btn-eraser').classList.add('active');
  document.getElementById('btn-pen').classList.remove('active');
});

// ---- color ----
const BG = '#e5e7eb';
const STOPS = [
  { t:  0, r: 120, g: 150, b: 170 }, 
  { t:  3, r: 50, g: 120, b: 220 },  
  { t: 10, r: 18, g:  30, b:  90 },  // 濃紺
  { t: 40, r: 20, g:  50, b:  60 },  
  { t: 60, r: 229, g: 231, b: 235 },  // #e5e7eb (背景色)
];

function colorAt(age) {
  if (age >= 60) return null;
  let a = STOPS[0], b = STOPS[1];
  for (let i = 0; i < STOPS.length - 1; i++) {
    if (age >= STOPS[i].t && age < STOPS[i+1].t) { a = STOPS[i]; b = STOPS[i+1]; break; }
  }
  const t  = (age - a.t) / (b.t - a.t);
  const r  = Math.round(a.r + (b.r - a.r) * t);
  const g  = Math.round(a.g + (b.g - a.g) * t);
  const bv = Math.round(a.b + (b.b - a.b) * t);
  return `rgb(${r},${g},${bv})`;
}

// ---- strokes ----
// type: 'draw' | 'erase'
const strokes = [];
let drawing = false;

// ---- canvas scale (canvas coords ↔ client coords) ----
function getScale() {
  const r = canvas.getBoundingClientRect();
  return { sx: 720 / r.width, sy: 720 / r.height, rect: r };
}

function getPos(e) {
  const { sx, sy, rect } = getScale();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * sx,
    y: (src.clientY - rect.top)  * sy
  };
}


// ---- clear ----
document.getElementById('btn-clear').addEventListener('click', () => {
  strokes.length = 0;
  tlReset();
});


// ---- timelapse recording ----
const MAX_FRAMES  = 3600;   // max 60 min @ 1fps
const SNAP_MS     = 1000;   // snapshot every 1s
const PLAYBACK_FPS = 32;    // output fps → 16x speed

let tlFrames      = [];     // array of ImageData
let tlRecording   = false;
let tlLastSnap    = 0;
let tlBlank       = true;   // true = canvas is blank, waiting for first stroke

const recDot    = document.getElementById('rec-dot');
const btnOutput = document.getElementById('btn-output');

function tlReset() {
  tlFrames    = [];
  tlRecording = false;
  tlLastSnap  = 0;
  tlBlank     = true;
  setDotState('');
  btnOutput.disabled = true;
}

function tlStartIfNeeded() {
  if (!tlBlank) return;
  tlBlank     = false;
  tlRecording = true;
  tlLastSnap  = performance.now();
  setDotState('active');
}

function tlTick(now) {
  if (!tlRecording) return;
  if (now - tlLastSnap < SNAP_MS) return;
  tlLastSnap = now;
  if (tlFrames.length >= MAX_FRAMES) return;
  tlFrames.push(ctx.getImageData(0, 0, 720, 720));
  if (tlFrames.length === 1) btnOutput.disabled = false;
}

function setDotState(state) {
  // state: '' | 'active' | 'generating' | 'done'
  recDot.classList.remove('active', 'generating', 'done');
  if (state) recDot.classList.add(state);
}

btnOutput.addEventListener('click', async () => {
  if (tlFrames.length === 0) return;

  // generating state
  btnOutput.disabled = true;
  setDotState('generating');

  // render frames into an offscreen canvas and record with MediaRecorder
  const off = document.createElement('canvas');
  off.width = off.height = 720;
  const offCtx = off.getContext('2d');

  const stream = off.captureStream(PLAYBACK_FPS);
  const mime   = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
               ? 'video/webm;codecs=vp9'
               : 'video/webm';
  const rec    = new MediaRecorder(stream, { mimeType: mime });
  const chunks = [];
  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  rec.onstop = () => {
    const blob = new Blob(chunks, { type: mime });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `pao_vestige_${new Date().toISOString().replace(/[:.]/g, '-')}.webm`;
    a.click();
    URL.revokeObjectURL(url);

    // done state → 2.5s後に録画中へ戻す
    btnOutput.disabled = false;
    setDotState('done');
    setTimeout(() => {
      if (tlRecording) setDotState('active');
    }, 2500);
  };

  rec.start();

  const frameDuration = 1000 / PLAYBACK_FPS;
  for (let i = 0; i < tlFrames.length; i++) {
    offCtx.putImageData(tlFrames[i], 0, 0);
    await new Promise(r => setTimeout(r, frameDuration));
  }

  rec.stop();
});

// ---- redraw ----
function redraw(now) {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, 720, 720);

  while (strokes.length && strokes[0].type === 'draw' && now - strokes[0].born >= 60000) strokes.shift();

  for (const s of strokes) {
    if (s.type === 'erase') {
      // erase strokes: clip region and fill BG, removing underlying pixels
      ctx.save();
      ctx.fillStyle = BG;
      const pts = s.points;
      for (const p of pts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, ERASER_R, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      continue;
    }

    const age = (now - s.born) / 1000;
    const col = colorAt(age);
    if (!col) continue;

    ctx.strokeStyle = col;
    ctx.fillStyle   = col;
    ctx.lineWidth   = PEN_R * 2;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    const pts = s.points;
    if (pts.length === 1) {
      ctx.beginPath();
      ctx.arc(pts[0].x, pts[0].y, PEN_R, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke();
    }
  }

  // Prune old erase strokes (they only matter while draw strokes beneath them exist)
  // Simple approach: keep all erase strokes that are younger than 60s from the oldest draw stroke
  // Actually: erase strokes need to persist as long as any draw stroke they cover is alive.
  // Simplest safe rule: drop erase strokes older than 60s
  for (let i = strokes.length - 1; i >= 0; i--) {
    if (strokes[i].type === 'erase' && now - strokes[i].born >= 60000) {
      strokes.splice(i, 1);
    }
  }

  tlTick(now);
  checkAllExpired();
  requestAnimationFrame(redraw);
}
requestAnimationFrame(redraw);

// ---- custom cursor ----
let mouseClient = { x: -200, y: -200 };

function drawCursor(x, y) {
  cctx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);

  // map radius from canvas px to screen px
  const { sx, sy } = getScale();
  const screenR = tool === 'pen'
    ? PEN_R / sx
    : ERASER_R / sx;

  cctx.beginPath();
  cctx.arc(x, y, Math.max(screenR, 1), 0, Math.PI * 2);

  if (tool === 'pen') {
    cctx.strokeStyle = 'rgba(60,60,80,0.8)';
    cctx.lineWidth   = 1;
    cctx.setLineDash([]);
  } else {
    cctx.strokeStyle = 'rgba(60,60,80,0.7)';
    cctx.lineWidth   = 1;
    cctx.setLineDash([3, 3]);
  }
  cctx.stroke();
  cctx.setLineDash([]);
}

canvas.addEventListener('mousemove', e => {
  mouseClient = { x: e.clientX, y: e.clientY };
  drawCursor(e.clientX, e.clientY);
});
canvas.addEventListener('mouseleave', () => {
  cctx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
});

// ---- input ----
canvas.addEventListener('mousedown', e => {
  tlStartIfNeeded();
  drawing = true;
  strokes.push({ type: tool === 'eraser' ? 'erase' : 'draw', points: [getPos(e)], born: performance.now() });
});
canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  strokes[strokes.length - 1].points.push(getPos(e));
});
canvas.addEventListener('mouseup',    () => { drawing = false; });
canvas.addEventListener('mouseleave', () => { drawing = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  tlStartIfNeeded();
  drawing = true;
  const p = getPos(e);
  strokes.push({ type: tool === 'eraser' ? 'erase' : 'draw', points: [p], born: performance.now() });
  drawCursor(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawing) return;
  strokes[strokes.length - 1].points.push(getPos(e));
  drawCursor(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchend', () => {
  drawing = false;
  cctx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
});

// ---- blank detection (all strokes expired → reset recording) ----
function checkAllExpired() {
  if (!tlRecording) return;
  // strokes配列から描画ストロークがすべて削除されていたらリセット
  // (redrawのwhileループが期限切れのdrawストロークを削除済みのタイミングで呼ぶ)
  const hasAnyDraw = strokes.some(s => s.type === 'draw');
  if (!hasAnyDraw) tlReset();
}

// patch tlTick to also check expiry
const _tlTick = tlTick;
// override: already called in redraw; add expiry check there instead

// ---- hint: copy hashtag ----
const toast = document.getElementById('toast');
let toastTimer = null;
document.getElementById('hint').addEventListener('click', () => {
  navigator.clipboard.writeText('#pao_vestige').then(() => {
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  });
});

</script>
</body>
</html>
